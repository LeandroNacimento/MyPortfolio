name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --target production -f docker/php/Dockerfile -t ghcr.io/leandronacimento/myportfolio:latest .

      - name: Push to GHCR
        run: |
          docker push ghcr.io/leandronacimento/myportfolio:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name portfolio-app \
            --resource-group portfolio \
            --image ghcr.io/leandronacimento/myportfolio:latest
