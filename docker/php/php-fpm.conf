[global]
error_log = /proc/self/fd/2
daemonize = no

[www]
user = www-data
group = www-data
listen = 9000

; Endpoint de ping para el healthcheck de Docker
pm.ping.path = /ping

; Logs redirigidos a la salida estándar para que "docker logs" pueda capturarlos
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

; Pool de Workers dinámico
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
clear_env = no
