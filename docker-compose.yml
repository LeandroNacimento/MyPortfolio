services:
  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: portfolio_php
    volumes:
      # Todo el código fuente montado directamente
      - .:/var/www/html
      # Archivos de configuración locales
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-custom.conf:ro
      - ./docker/php/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      # NOTA: En dev no necesitamos volumen extra para SQLite porque 
      # ".:/var/www/html" ya incluye la base de datos en la máquina host.
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - portfolio_net
    healthcheck:
      # cgi-fcgi hace un ping al endpoint definido en php-fpm.conf
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    entrypoint: ["sh", "/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]

  node:
    image: node:22-alpine
    container_name: portfolio_node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    command: npm run dev
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge
